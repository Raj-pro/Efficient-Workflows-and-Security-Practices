name: Docker Layer Cache Demo

on:
  workflow_dispatch:

jobs:
  build_with_cache:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: my-org/my-app:latest

          # THE MAGIC: Intelligent Caching
          # Pull old layers from the GitHub Container Registry cache
          cache-from: type=registry,ref=ghcr.io/my-org/my-app:buildcache
          # Push the new layers back to the cache for the next run
          cache-to: type=registry,ref=ghcr.io/my-org/my-app:buildcache,mode=max
