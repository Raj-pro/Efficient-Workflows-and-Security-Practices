name: SAST and DAST Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security_scans:
    name: SAST and DAST Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- SAST PHASE (CodeQL) ---
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'javascript'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # --- DAST PHASE (OWASP ZAP) ---
      # This usually runs after the app is deployed to a staging environment
      - name: ZAP Full Scan (DAST)
        uses: zaproxy/action-full-scan@v0.9.0
        with:
          target: 'https://staging.your-app.com'
          artifact_name: 'zap-scan-report'
