name: Secret Masking Demo

on:
  workflow_dispatch:

# You must grant the runner permission to request the OIDC token
permissions:
  id-token: write   # Required for OIDC
  contents: read    # Required to checkout the code

jobs:
  mask_demo:
    name: Generate and Mask DB Password
    runs-on: ubuntu-latest
    steps:
      - name: Generate and Mask DB Password
        run: |
          TEMP_PASS=$(openssl rand -base64 12)

          # Tell GitHub Actions: "If you ever see this exact string in the logs, censor it!"
          echo "::add-mask::$TEMP_PASS"

          # Now, if we try to print it, it will output as ***
          echo "The password is $TEMP_PASS"
